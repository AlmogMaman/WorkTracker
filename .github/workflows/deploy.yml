name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Deploy workflow: deny all permissions by default, grant only what's needed.
permissions: read-all

jobs:
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-24.04         # Pinned OS — never break silently on runner upgrade
    timeout-minutes: 15
    # Hard gate: only proceed if CI workflow completed successfully on main.
    # The job-level `if` is the authoritative guard (workflow_run trigger
    # fires on both success and failure — the condition here is what actually blocks).
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      deployments: write          # Required to create a GitHub deployment record
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      # Do NOT use workflow_run.head_sha as ref — that is a CodeQL-flagged
      # security risk (runs incoming code in the context of the target repo).
      # The job-level `if` already guarantees this only runs on main pushes,
      # so a plain checkout of the default branch (main) is correct and safe.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"   # Exact version — same as CI to guarantee identical build
          cache: npm

      - name: Install dependencies (clean install from lockfile)
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      # ── Final axios sanity check immediately before the artifact ships ─────
      # Belt-and-suspenders: CI already verified this; we re-check on the exact
      # artifact that will be deployed, not a previously cached/uploaded one.
      - name: Final axios check on deploy artifact
        run: |
          if grep -rq "axios" dist/ --include="*.js"; then
            echo "ABORT: axios detected in compiled bundle. Deployment cancelled."
            exit 1
          fi
          echo "PASS: axios-free bundle confirmed"

      # ── Deploy to Vercel production ──────────────────────────────────────
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel

          # Single command: pull config + deploy the already-built dist/
          # --yes answers all prompts automatically (fixes "no YES option" error)
          # --archive=tgz bundles dist/ for upload without a separate build step
          DEPLOY_URL=$(vercel deploy dist/ \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN")

          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      # ── Post-deploy: verify security headers are live on the deployed URL ──
      - name: Verify security headers on live deployment
        if: steps.deploy.outputs.url != ''
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "Checking live security headers on $DEPLOY_URL ..."

          # curl flags: -s silent, -I head-only, --max-time 15s, --fail on HTTP error
          HTTP_HEADERS=$(curl -sI --max-time 15 --fail "$DEPLOY_URL")

          FAIL=0

          check_present() {
            local label="$1"; local pattern="$2"
            if echo "$HTTP_HEADERS" | grep -qi "$pattern"; then
              echo " OK : $label"
            else
              echo "FAIL: $label missing or incorrect"
              FAIL=1
            fi
          }

          check_present "Content-Security-Policy"  "content-security-policy:"
          check_present "X-Frame-Options: DENY"    "x-frame-options: DENY"
          check_present "X-Content-Type-Options"   "x-content-type-options: nosniff"
          check_present "Strict-Transport-Security" "strict-transport-security:"
          check_present "Referrer-Policy"           "referrer-policy:"

          # Ensure unsafe-eval is NOT in the live CSP
          CSP=$(echo "$HTTP_HEADERS" | grep -i "content-security-policy:" || true)
          if echo "$CSP" | grep -qi "unsafe-eval"; then
            echo "FAIL: unsafe-eval is present in the live CSP header!"
            FAIL=1
          else
            echo " OK : unsafe-eval not present in live CSP"
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "One or more live security header checks FAILED."
            exit 1
          fi
          echo "All live security header checks passed."
