name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Principle of least privilege: deny all permissions by default.
# Each job opts in to exactly what it needs.
permissions: read-all

# Cancel in-progress runs for the same branch/PR to save compute and avoid races.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: TypeScript strict type-check
  # ──────────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript type-check
    runs-on: ubuntu-24.04        # Pinned OS — never break silently on OS upgrade
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"   # Exact Node version — not a range
          cache: npm

      - name: Install dependencies (clean install from lockfile)
        run: npm ci --ignore-scripts   # --ignore-scripts: prevents malicious postinstall execution

      - name: Run tsc --noEmit (strict mode)
        run: npx --no-install tsc --noEmit
        # --no-install: use the tsc already installed by npm ci, never auto-install

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: ESLint — code quality + embedded-secret detection
  # ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install project dependencies
        run: npm ci --ignore-scripts

      - name: Install ESLint and security plugins (pinned versions)
        # Versions are pinned at exact patch level.
        # Update via: npm install --no-save eslint@X.Y.Z (then update here)
        run: |
          npm install --no-save \
            eslint@8.57.1 \
            @typescript-eslint/parser@7.18.0 \
            @typescript-eslint/eslint-plugin@7.18.0 \
            eslint-plugin-react@7.37.4 \
            eslint-plugin-react-hooks@4.6.2 \
            eslint-plugin-react-refresh@0.4.19 \
            eslint-plugin-no-secrets@1.1.2

      - name: Run ESLint
        run: npx --no-install eslint src/ --ext .ts,.tsx --max-warnings 0

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: Axios ban — source scan + npm ci + npm list (local + global)
  # ──────────────────────────────────────────────────────────────────────────────
  axios-ban:
    name: Axios ban
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      # ── Source-level checks (before install) ────────────────────────────────
      - name: Scan package manifests for axios
        run: |
          echo "Checking package.json and package-lock.json..."
          if grep -q '"axios"' package.json 2>/dev/null; then
            echo "FAIL: axios found in package.json"
            exit 1
          fi
          if grep -q '"axios"' package-lock.json 2>/dev/null; then
            echo "FAIL: axios found in package-lock.json"
            exit 1
          fi
          echo "PASS: axios not in package manifests"

      - name: Scan source files for axios imports
        run: |
          echo "Scanning src/ for axios imports..."
          if grep -rq "from ['\"]axios['\"]" src/; then
            echo "FAIL: axios ES import found in source files:"
            grep -rn "from ['\"]axios['\"]" src/
            exit 1
          fi
          if grep -rq "require(['\"]axios['\"])" src/; then
            echo "FAIL: axios require() found in source files:"
            grep -rn "require(['\"]axios['\"])" src/
            exit 1
          fi
          if grep -riq "axios" src/ --include="*.ts" --include="*.tsx"; then
            echo "FAIL: any reference to axios found in source files:"
            grep -rni "axios" src/ --include="*.ts" --include="*.tsx"
            exit 1
          fi
          echo "PASS: axios not referenced in any source file"

      # ── Runtime checks via npm ci + npm list ────────────────────────────────
      # npm ci (not npm install) — deterministic, no lockfile mutation
      - name: Install dependencies (clean install from lockfile)
        run: npm ci --ignore-scripts

      - name: Check axios not in local project dependency tree
        run: |
          echo "Running: npm list axios"
          if npm list axios 2>/dev/null | grep -q "axios"; then
            echo "FAIL: axios is present in local project dependency tree:"
            npm list axios
            exit 1
          fi
          echo "PASS: axios not found in local dependencies"

      - name: Check axios not installed globally on runner
        run: |
          echo "Running: npm list -g axios"
          if npm list -g axios 2>/dev/null | grep -q "axios"; then
            echo "FAIL: axios is installed globally on this runner:"
            npm list -g axios
            exit 1
          fi
          echo "PASS: axios not found globally"

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 4: Secret scanning — git history (TruffleHog) + working tree (Gitleaks)
  # ──────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # Full history — TruffleHog scans all commits
          persist-credentials: false

      - name: TruffleHog — scan git history for secrets
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          # scan everything pushed, handling first-commit edge case where before==after
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '' }}
          head: HEAD
          extra_args: --only-verified

      - name: Gitleaks — scan working tree and diff
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is optional — omit for OSS-only mode
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 5: Dependency audit — CVEs, licenses, lockfile integrity, supply chain
  # ──────────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Verify lockfile is consistent with package.json
        # npm ci fails if package-lock.json is out of sync — this is the dry-run check
        run: npm ci --dry-run

      - name: npm audit — block on High/Critical CVEs
        run: npm audit --audit-level=high

      - name: Install license-checker
        run: npm install --no-save license-checker

      - name: Check dependency licenses (allowlist)
        run: |
          npx license-checker --onlyAllow \
            "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0;Unlicense;0BSD;Python-2.0;BlueOak-1.0.0" \
            --excludePrivatePackages

      - name: Socket CLI — supply-chain behavioral risk check
        continue-on-error: true   # informational — findings logged but don't block CI
        run: |
          npm install --no-save @socketsecurity/cli
          npx socket check --strict

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 6: SAST — CodeQL deep dataflow + Semgrep React/OWASP rules
  # ──────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (CodeQL + Semgrep)
    runs-on: ubuntu-24.04
    timeout-minutes: 30           # CodeQL can be slow on larger codebases
    permissions:
      security-events: write      # Required: CodeQL uploads SARIF to GitHub Security tab
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Build for CodeQL analysis
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

      - name: Run Semgrep (React + TypeScript + OWASP Top 10)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/react
            p/typescript
            p/security-audit
            p/owasp-top-ten
            p/xss
            p/secrets
        env:
          # SEMGREP_APP_TOKEN is optional — omit for OSS-only rules with no rate limit
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 7: Claude Code AI security review
  # Runs Claude Code in non-interactive mode against the full codebase.
  # Fails CI if Claude identifies any CRITICAL security findings.
  # ──────────────────────────────────────────────────────────────────────────────
  claude-security-review:
    name: Claude Code security review
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code security audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            "You are a senior AppSec engineer performing a CI security gate review of this React 18 + TypeScript + Vite PWA (React 18, TypeScript, Vite 6, Zustand, Tailwind CSS, no backend).

            Read every file in src/ and public/ thoroughly. Then produce a complete security report structured EXACTLY as follows — do not deviate from this format, as the CI pipeline parses it:

            ---
            ## Claude Code Security Audit Report

            ### Summary
            One paragraph: overall security posture, what was audited, verdict.

            ### Critical Findings  (blocks deployment)
            For each critical issue:
            CRITICAL: [short title]
            - File: <file path and line number>
            - Issue: <precise description of the vulnerability>
            - Risk: <what an attacker could do>
            - Fix: <exact code change or remediation step required>

            If none: write 'None found.'

            ### Warnings  (should fix, does not block)
            For each warning:
            WARNING: [short title]
            - File: <file path and line number>
            - Issue: <description>
            - Fix: <remediation>

            If none: write 'None found.'

            ### Informational Notes
            INFO: [note] — one line each.

            ### Remediation Checklist
            A numbered markdown checklist of every action required to reach a clean audit,
            ordered from highest to lowest priority. Include file:line references.
            - [ ] 1. ...
            - [ ] 2. ...

            ---
            AUDIT_RESULT: PASS
            (or AUDIT_RESULT: FAIL if any CRITICAL findings exist)
            ---

            Audit scope — check ALL of the following:
            1. XSS: dangerouslySetInnerHTML, innerHTML, document.write, eval, new Function()
            2. Prototype pollution, __proto__, Object.assign on user input
            3. Hardcoded secrets: API keys, tokens, passwords, private keys, base64 blobs
            4. Forbidden packages: axios or any package with known supply-chain compromise
            5. CSP weakening: any code that loosens or bypasses Content-Security-Policy
            6. Unvalidated input reaching the DOM or localStorage without sanitization
            7. Sensitive data in console.log, localStorage keys, or error messages
            8. React-specific: unsafe prop spreading, missing key props in security contexts
            9. OWASP Top 10 applicable to a browser-only PWA
            10. Service worker attack surface: cache poisoning, scope misconfiguration
            11. Clickjacking, open redirects, URL injection
            12. Dependency confusion or typosquatting in import paths

            Be thorough and precise. Include file paths and line numbers for every finding.
            Do not report false positives. Every CRITICAL finding must have a specific Fix." \
            2>&1 | tee /tmp/claude_security_report.txt

          echo ""
          echo "═══════════════════════════════════════════════"
          echo "    Claude Code Security Audit — Full Report"
          echo "═══════════════════════════════════════════════"
          cat /tmp/claude_security_report.txt
          echo ""

          if grep -q "AUDIT_RESULT: FAIL" /tmp/claude_security_report.txt; then
            echo "FAIL: Claude Code identified CRITICAL security issues. Full report uploaded as artifact."
            exit 1
          fi

          if ! grep -q "AUDIT_RESULT:" /tmp/claude_security_report.txt; then
            echo "WARNING: Claude Code did not produce a conclusive AUDIT_RESULT line. Treating as non-blocking."
            exit 0
          fi

          echo "PASS: Claude Code security review — no critical findings."

      - name: Upload Claude security report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-security-report-${{ github.sha }}
          path: /tmp/claude_security_report.txt
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 8: Build + artifact security validation
  # Hard gate: depends on ALL 7 security jobs passing.
  # ──────────────────────────────────────────────────────────────────────────────
  build-and-artifact:
    name: Build and artifact scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    needs:
      - type-check
      - lint
      - axios-ban
      - secret-scan
      - dependency-audit
      - sast
      - claude-security-review
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install dependencies (clean install from lockfile)
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      # ── Scan the compiled bundle for leaked secrets ────────────────────────
      - name: Scan dist/ for leaked secrets and sensitive strings
        run: |
          echo "Scanning dist/ for sensitive patterns..."
          FAIL=0

          # Hardcoded token/key patterns
          if grep -riq "api[_-]key\|apikey\|api_secret\|private[_-]key\|secret[_-]key\|access[_-]token\|bearer " \
              dist/ --include="*.js" --include="*.html"; then
            echo "FAIL: Potential secret keyword found in dist/"
            grep -rni "api[_-]key\|apikey\|api_secret\|private[_-]key\|secret[_-]key\|access[_-]token\|bearer " \
                dist/ --include="*.js" --include="*.html"
            FAIL=1
          fi

          # Warn (non-fatal) on long base64 blobs — minified JS can legitimately have these
          if grep -rqP "[A-Za-z0-9+/]{60,}={0,2}" dist/ --include="*.js"; then
            echo "WARNING: Very long base64-like strings found (review manually — may be legitimate):"
            grep -rnoP "[A-Za-z0-9+/]{60,}={0,2}" dist/ --include="*.js" | head -10
          fi

          # axios in the compiled bundle (belt-and-suspenders after Job 3)
          if grep -rq "axios" dist/ --include="*.js"; then
            echo "FAIL: axios string found in compiled bundle"
            exit 1
          fi

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No secrets or forbidden libraries found in dist/"

      # ── Validate CSP has not been weakened ────────────────────────────────
      - name: Validate CSP headers in vercel.json
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync } from 'fs';
          const vercel = JSON.parse(readFileSync('vercel.json', 'utf8'));
          const headers = vercel.headers?.[0]?.headers ?? [];
          const csp = headers.find(h => h.key === 'Content-Security-Policy');

          if (!csp) {
            console.error('FAIL: Content-Security-Policy header missing from vercel.json');
            process.exit(1);
          }

          const val = csp.value;
          const checks = [
            { test: !val.includes("'unsafe-eval'"),        name: "no unsafe-eval" },
            { test: !val.match(/script-src[^;]*'unsafe-inline'/), name: "no unsafe-inline in script-src" },
            { test: val.includes("object-src 'none'"),     name: "object-src 'none' present" },
            { test: val.includes("default-src 'self'"),    name: "default-src 'self' present" },
            { test: val.includes("base-uri 'self'"),       name: "base-uri 'self' present" },
            { test: val.includes("form-action 'self'"),    name: "form-action 'self' present" },
          ];

          let failed = false;
          for (const c of checks) {
            if (!c.test) { console.error('FAIL:', c.name); failed = true; }
            else          { console.log(' OK :', c.name); }
          }
          if (failed) process.exit(1);
          console.log('All CSP checks passed.');
          EOF

      # ── Validate all required security headers are present ────────────────
      - name: Validate security headers completeness
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync } from 'fs';
          const vercel = JSON.parse(readFileSync('vercel.json', 'utf8'));
          const headers = vercel.headers?.[0]?.headers ?? [];
          const map = Object.fromEntries(headers.map(h => [h.key, h.value]));

          const required = [
            'Content-Security-Policy',
            'X-Content-Type-Options',
            'X-Frame-Options',
            'Referrer-Policy',
            'Permissions-Policy',
            'Strict-Transport-Security',
          ];

          let failed = false;
          for (const r of required) {
            if (!map[r]) { console.error('FAIL: Missing header:', r); failed = true; }
            else          { console.log(' OK : Present:', r); }
          }

          if (!['DENY','SAMEORIGIN'].includes(map['X-Frame-Options'])) {
            console.error('FAIL: X-Frame-Options unsafe value:', map['X-Frame-Options']);
            failed = true;
          }

          const maxAge = parseInt((map['Strict-Transport-Security']?.match(/max-age=(\d+)/) ?? [])[1] ?? '0');
          if (maxAge < 31536000) {
            console.error('FAIL: HSTS max-age too short:', maxAge, '(must be >= 31536000 / 1 year)');
            failed = true;
          } else {
            console.log(' OK : HSTS max-age:', maxAge);
          }

          if (failed) process.exit(1);
          console.log('All security header checks passed.');
          EOF

      - name: Upload dist/ as pipeline artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 9: Consolidated security report
  # Always runs — even when other jobs fail or are cancelled.
  # Downloads the Claude report artifact, calls the report script, and publishes
  # a single actionable markdown report to the GitHub Actions Step Summary
  # (the "Summary" tab of the run — no log-digging needed).
  # ──────────────────────────────────────────────────────────────────────────────
  security-report:
    name: Consolidated security report
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: always()
    permissions:
      contents: read
      actions: read
    needs:
      - type-check
      - lint
      - axios-ban
      - secret-scan
      - dependency-audit
      - sast
      - claude-security-review
      - build-and-artifact
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download Claude security report artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-security-report-${{ github.sha }}
          path: /tmp/artifacts/claude
        continue-on-error: true   # Non-fatal if claude job was skipped or cancelled

      - name: Generate and publish consolidated report
        env:
          RESULT_TYPE_CHECK:  ${{ needs.type-check.result }}
          RESULT_LINT:        ${{ needs.lint.result }}
          RESULT_AXIOS_BAN:   ${{ needs.axios-ban.result }}
          RESULT_SECRET_SCAN: ${{ needs.secret-scan.result }}
          RESULT_DEP_AUDIT:   ${{ needs.dependency-audit.result }}
          RESULT_SAST:        ${{ needs.sast.result }}
          RESULT_CLAUDE:      ${{ needs.claude-security-review.result }}
          RESULT_BUILD:       ${{ needs.build-and-artifact.result }}
          GH_SHA:             ${{ github.sha }}
          GH_REF:             ${{ github.ref }}
          GH_ACTOR:           ${{ github.actor }}
          GH_RUN_ID:          ${{ github.run_id }}
          GH_SERVER_URL:      ${{ github.server_url }}
          GH_REPOSITORY:      ${{ github.repository }}
          CLAUDE_REPORT_PATH: /tmp/artifacts/claude/claude_security_report.txt
          REPORT_FILE:        /tmp/security-report.md
        run: |
          chmod +x .github/scripts/generate-report.sh
          .github/scripts/generate-report.sh

      - name: Upload consolidated security report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-report-${{ github.sha }}
          path: /tmp/security-report.md
          retention-days: 30

      # Fail this job so the overall pipeline shows red when any security check failed.
      - name: Fail pipeline if any security job failed
        if: >
          needs.type-check.result == 'failure' ||
          needs.lint.result == 'failure' ||
          needs.axios-ban.result == 'failure' ||
          needs.secret-scan.result == 'failure' ||
          needs.dependency-audit.result == 'failure' ||
          needs.sast.result == 'failure' ||
          needs.claude-security-review.result == 'failure' ||
          needs.build-and-artifact.result == 'failure'
        run: |
          echo "One or more security jobs failed. See the Step Summary tab for the full report."
          exit 1
