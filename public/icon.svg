<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#2563EB"/>
  <!-- Clock face -->
  <circle cx="256" cy="276" r="150" fill="none" stroke="white" stroke-width="26"/>
  <!-- Hour hand -->
  <line x1="256" y1="276" x2="256" y2="168" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="276" x2="334" y2="322" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="276" r="14" fill="white"/>
  <!-- Crown stem -->
  <rect x="232" y="94" width="48" height="26" rx="13" fill="white"/>
  <!-- Left alarm foot -->
  <line x1="160" y1="148" x2="130" y2="116" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Right alarm foot -->
  <line x1="352" y1="148" x2="382" y2="116" stroke="white" stroke-width="20" stroke-linecap="round"/>
</svg>
